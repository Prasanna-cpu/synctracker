spring:
  application:
    name: eureka-service

server:
  port: ${PORT}

eureka:
  instance:
    hostname: ${HOST}
#    instance-id: ${spring.application.name}:${server.port}
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
        defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/