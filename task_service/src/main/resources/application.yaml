spring:
  application:
    name: TASK-SERVICE

  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    url: ${DB_URL}

  jpa:
    hibernate:
      ddl-auto: update
    generate-ddl: true
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: ${PORT}
logging:
  level:
    org.springframework.security : DEBUG

user-service:
  host: ${HOST}
  port: ${USER_PORT}
  url: http://${user-service.host}:${user-service.port}

eureka:
  host: ${HOST}
  port: ${EUREKA_PORT}

  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}


  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://${eureka.host}:${eureka.port}/eureka/
