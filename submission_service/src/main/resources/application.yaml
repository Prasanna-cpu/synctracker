spring:
  application:
    name: submission_service

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    generate-ddl: true
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: ${PORT}

logging:
  level:
#    org.springframework.web: DEBUG
    org.springframework.security : DEBUG