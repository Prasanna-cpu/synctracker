spring:
  application:
    name: user-service

  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    url: ${DB_URL}

  jpa:
    hibernate:
      ddl-auto: update
    generate-ddl: true
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.springframework.security: DEBUG




server:
  port: ${PORT}


secret:
  jwt: ${JWT_SECRET}
  jwt-header: ${JWT_HEADER}