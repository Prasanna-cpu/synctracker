spring:
  application:
    name: USER-SERVICE

  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    url: ${DB_URL}

  jpa:
    hibernate:
      ddl-auto: update
    generate-ddl: true
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.springframework.security: DEBUG




server:
  port: ${PORT}


secret:
  jwt: ${JWT_SECRET}
  jwt-header: ${JWT_HEADER}


eureka:
  host: ${HOST}
  port: ${EUREKA_PORT}

  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}


  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
        defaultZone: http://${eureka.host}:${eureka.port}/eureka/