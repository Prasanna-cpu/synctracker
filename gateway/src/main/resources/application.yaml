spring:
  application:
    name: GATEWAY-SERVICE

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: USER-SERVICE
              uri:
                lb://USER-SERVICE
              predicates:
                - Path=/auth/**, /api/users/**, /users/**, /
            - id: TASK-SERVICE
              uri:
                lb://TASK-SERVICE
              predicates:
                - Path=/api/tasks/**, /tasks/**
            - id: SUBMISSION-SERVICE
              uri:
                lb://SUBMISSION-SERVICE
              predicates:
                - Path=/api/submissions/**, /submissions/**

          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: "*"
                allowedMethods: "*"
                allowedHeaders: "*"


user-service:
  host: ${HOST}
  port: ${USER_PORT}
  uri: http://${user-service.host}:${user-service.port}

task-service:
  host: ${HOST}
  port: ${TASK_PORT}
  uri: http://${task-service.host}:${task-service.port}

submission-service:
  host: ${HOST}
  port: ${SUBMISSION_PORT}
  uri: http://${submission-service.host}:${submission-service.port}





server:
  port: ${PORT}




eureka:
  host: ${HOST}
  port: ${EUREKA_PORT}

  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}


  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://${eureka.host}:${eureka.port}/eureka/